# Dependabot — automated dependency security updates.
# Adjust the package-ecosystem entries to match your stack.
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Force SHA pinning so Dependabot updates the SHA + comment together.
    # Major bumps still require human review.
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns: ["*"]

