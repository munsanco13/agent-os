name: ✨ Feature request
description: Propose a new capability or enhancement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point. Concrete examples > abstract goals.
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would the ideal user experience look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one wins.
  - type: textarea
    id: scope
    attributes:
      label: Is this in scope for Agent OS?
      description: |
        Agent OS owns: documentation + enforcement + handoff for sequential multi-AI development.
        Adjacent problems (parallel agents, GUIs, LLM SDKs) belong in other tools — see the comparison table in the README.
        Briefly justify why this fits Agent OS specifically.
    validations:
      required: true
